<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuisine Details - FoodIt</title>
    <meta name="description" content="Explore delicious dishes from your favorite cuisine on FoodIt.">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="pb-24" style="background:#fff;">
    <div id="header-mount"></div>

    <!-- Hero Section -->
    <div style="position:relative;height:288px;width:100%;overflow:hidden;">
        <img id="hero-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;">
        <div
            style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7),rgba(0,0,0,0.15),transparent);">
        </div>

        <!-- Back Button -->
        <a href="index.html" class="glass"
            style="position:absolute;top:24px;left:24px;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#111;box-shadow:0 8px 25px rgba(0,0,0,0.15);transition:all 0.3s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>

        <div style="position:absolute;bottom:32px;left:24px;right:24px;" class="slide-in-top">
            <h1 id="cuisine-name"
                style="font-size:48px;font-weight:900;color:white;letter-spacing:-0.025em;margin-bottom:8px;text-transform:uppercase;">
            </h1>
            <p id="cuisine-desc" style="color:rgba(255,255,255,0.8);font-size:18px;font-weight:500;max-width:600px;">
            </p>
        </div>
    </div>

    <!-- Location Sticky Bar -->
    <div
        style="position:sticky;top:0;z-index:40;background:linear-gradient(to right,#1d4ed8,#1e3a8a);color:white;box-shadow:0 4px 15px rgba(0,0,0,0.15);overflow:hidden;">
        <div class="max-w-7xl" style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:16px;">
                <div
                    style="background:rgba(59,130,246,0.5);backdrop-filter:blur(8px);padding:8px;border-radius:12px;color:white;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <div>
                    <p
                        style="font-size:10px;text-transform:uppercase;font-weight:900;opacity:0.6;letter-spacing:0.1em;line-height:1;margin-bottom:4px;">
                        Delivering to</p>
                    <p id="location-text" style="font-weight:700;font-size:14px;letter-spacing:-0.015em;">Select
                        location</p>
                </div>
            </div>
            <div
                style="display:flex;align-items:center;gap:8px;background:rgba(59,130,246,0.3);padding:8px 16px;border-radius:9999px;border:1px solid rgba(96,165,250,0.2);">
                <div style="width:8px;height:8px;background:#4ade80;border-radius:50;" class="animate-pulse"></div>
                <span style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;">15-20
                    Mins</span>
            </div>
        </div>
    </div>

    <main class="max-w-7xl" style="padding:40px 24px;">
        <!-- Offers -->
        <div style="margin-bottom:48px;background:linear-gradient(to right,#fb923c,#ef4444);border-radius:24px;padding:32px;color:white;box-shadow:0 25px 50px rgba(0,0,0,0.15);position:relative;overflow:hidden;"
            class="slide-in-right">
            <div
                style="position:absolute;inset:0;opacity:0.1;background-image:url('https://www.transparenttextures.com/patterns/carbon-fibre.png');">
            </div>
            <div style="display:flex;align-items:flex-start;gap:24px;position:relative;z-index:1;">
                <div style="background:rgba(0,0,0,0.2);padding:16px;border-radius:20px;backdrop-filter:blur(8px);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h3 style="font-weight:900;font-size:24px;letter-spacing:-0.025em;margin-bottom:8px;">Weekend
                        Special! 🍕</h3>
                    <p style="color:rgba(255,255,255,0.9);font-weight:500;font-size:16px;line-height:1.6;">Flat 50%
                        Cashback + FREE Delivery on all signature dishes.</p>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div id="filter-bar" style="margin-bottom:40px;display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;"
            class="hide-scrollbar">
            <button data-filter="all"
                style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 24px;background:#111;color:white;border:2px solid #111;border-radius:16px;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.3s;cursor:pointer;"
                onclick="filterMenu('all', this)">
                🍽️ All Items
            </button>
            <button data-filter="veg"
                style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 24px;background:#f9fafb;color:#374151;border:2px solid #f3f3f3;border-radius:16px;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.3s;cursor:pointer;"
                onclick="filterMenu('veg', this)">
                🥬 Veg Only
            </button>
            <button data-filter="nonveg"
                style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 24px;background:#f9fafb;color:#374151;border:2px solid #f3f3f3;border-radius:16px;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.3s;cursor:pointer;"
                onclick="filterMenu('nonveg', this)">
                🍗 Non-Veg
            </button>
            <button data-filter="bestseller"
                style="flex-shrink:0;display:flex;align-items:center;gap:8px;padding:12px 24px;background:#f9fafb;color:#374151;border:2px solid #f3f3f3;border-radius:16px;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.3s;cursor:pointer;"
                onclick="filterMenu('bestseller', this)">
                ⭐ Best Rated
            </button>
        </div>

        <!-- Item count -->
        <p id="item-count" style="margin-bottom:24px;font-size:14px;color:#9ca3af;font-weight:600;"></p>

        <!-- Menu Grid -->
        <div id="menu-grid" class="grid grid-2 lg-grid-4" style="gap:24px;">
            <!-- Injected via script -->
        </div>
    </main>

    <!-- Floating Cart Button -->
    <div style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:50;">
        <a href="cart.html"
            style="background:#111;color:white;display:flex;align-items:center;gap:16px;padding:16px 32px;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,0.3);transition:all 0.3s;text-decoration:none;"
            onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <div style="position:relative;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span class="cart-count-badge"
                    style="position:absolute;top:-8px;right:-8px;background:#ea580c;color:white;font-size:10px;font-weight:900;width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid #111;">0</span>
            </div>
            <span style="font-weight:900;text-transform:uppercase;letter-spacing:0.1em;font-size:12px;">View
                Plate</span>
        </a>
    </div>

    <div id="bottomnav-mount"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Mount shared components
        document.getElementById('header-mount').innerHTML = renderHeader('cuisine');
        document.getElementById('bottomnav-mount').innerHTML = renderBottomNav('home');

        // Get cuisine from URL
        const urlParams = new URLSearchParams(window.location.search);
        const cuisineId = urlParams.get('id');
        const cuisine = cuisines.find(c => c.id === cuisineId);

        // All items for this cuisine
        let allCuisineItems = [];
        let activeFilter = 'all';

        if (cuisine) {
            document.title = cuisine.name + ' - FoodIt';
            document.getElementById('cuisine-name').textContent = cuisine.name;
            document.getElementById('cuisine-desc').textContent = cuisine.description;
            document.getElementById('hero-img').src = cuisine.image;
            document.getElementById('hero-img').alt = cuisine.name;

            allCuisineItems = menuItems.filter(item => item.cuisine.toLowerCase() === cuisine.name.toLowerCase());

            renderGrid(allCuisineItems);
        } else {
            document.getElementById('cuisine-name').textContent = 'Not Found';
            document.getElementById('cuisine-desc').textContent = 'This cuisine does not exist.';
        }

        // Location text
        const locEl = document.getElementById('location-text');
        if (store.selectedLocation?.address) {
            locEl.textContent = store.selectedLocation.address.substring(0, 30) + '...';
        }

        function renderGrid(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            if (items.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🍽️</div>
                        <p style="font-size:18px;font-weight:700;color:#374151;margin-bottom:8px;">No items found</p>
                        <p style="font-size:14px;color:#9ca3af;">Try a different filter</p>
                    </div>`;
                document.getElementById('item-count').textContent = '';
                return;
            }
            document.getElementById('item-count').textContent = items.length + ' item' + (items.length > 1 ? 's' : '') + ' available';
            items.forEach(item => {
                grid.innerHTML += renderMenuCard(item);
            });
        }

        function getFilteredItems() {
            if (activeFilter === 'veg') return allCuisineItems.filter(i => i.veg);
            if (activeFilter === 'nonveg') return allCuisineItems.filter(i => !i.veg);
            if (activeFilter === 'bestseller') return [...allCuisineItems].sort((a, b) => b.rating - a.rating);
            return allCuisineItems;
        }

        function filterMenu(filterType, btnEl) {
            activeFilter = filterType;

            // Update button styles
            document.querySelectorAll('#filter-bar button').forEach(btn => {
                btn.style.background = '#f9fafb';
                btn.style.color = '#374151';
                btn.style.borderColor = '#f3f3f3';
            });
            btnEl.style.background = '#111';
            btnEl.style.color = 'white';
            btnEl.style.borderColor = '#111';

            renderGrid(getFilteredItems());
        }

        document.addEventListener('cart:updated', () => {
            renderGrid(getFilteredItems());
        });
    </script>
</body>

</html>
